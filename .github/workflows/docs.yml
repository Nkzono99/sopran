name: docs

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/configure-pages@v5
      - run: python -m pip install --upgrade pip
      - run: python -m pip install mkdocs mkdocs-material "mkdocstrings[python]" pymdown-extensions numpy
      - run: mkdocs build --strict
        env:
          PYTHONPATH: src
      - uses: actions/upload-pages-artifact@v4
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
