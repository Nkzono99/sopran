name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  CIBW_BUILD: "cp311-* cp312-* cp313-* cp314-*"
  CIBW_SKIP: "pp* *-musllinux_*"
  CIBW_TEST_SKIP: "cp312-manylinux_x86_64 cp313-manylinux_x86_64 cp314-manylinux_x86_64"
  CIBW_TEST_COMMAND: >-
    python -c "import sopran, sopran._native as native; assert hasattr(native, 'read_pace_pbf')"
  CIBW_ENVIRONMENT_LINUX: 'PATH="$HOME/.cargo/bin:$PATH"'
  CIBW_BEFORE_ALL_LINUX: >-
    curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal

jobs:
  check-version:
    name: Check tag matches package version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Check tag matches package version
        run: |
          python - <<'PY'
          import ast
          import os
          import pathlib
          import sys
          import tomllib

          pyproject = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          project_version = pyproject["project"]["version"]

          init_tree = ast.parse(pathlib.Path("src/sopran/__init__.py").read_text(encoding="utf-8"))
          init_version = None
          for node in init_tree.body:
              if (
                  isinstance(node, ast.Assign)
                  and any(isinstance(target, ast.Name) and target.id == "__version__" for target in node.targets)
                  and isinstance(node.value, ast.Constant)
                  and isinstance(node.value.value, str)
              ):
                  init_version = node.value.value
                  break
          if init_version is None:
              raise SystemExit("Could not find __version__ in src/sopran/__init__.py")
          if init_version != project_version:
              raise SystemExit(
                  f"pyproject.toml version {project_version!r} does not match __version__ {init_version!r}"
              )

          ref = os.environ["GITHUB_REF"]
          if not ref.startswith("refs/tags/"):
              print(f"Skipping tag comparison for non-tag ref {ref}; package version is {project_version}")
              sys.exit(0)

          tag_version = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          if project_version != tag_version:
              raise SystemExit(
                  f"Package version {project_version!r} does not match tag {tag_version!r}"
              )
          PY

  build-sdist:
    name: Build source distribution
    needs:
      - check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Build sdist
        run: python -m build --sdist

      - name: Check sdist metadata
        run: python -m twine check dist/*

      - name: Store source distribution
        uses: actions/upload-artifact@v5
        with:
          name: python-package-sdist
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  build-wheels:
    name: Build wheels (${{ matrix.artifact }})
    needs:
      - check-version
    runs-on: ${{ matrix.os }}
    env:
      CIBW_ARCHS: ${{ matrix.cibw_archs }}
      CIBW_ENVIRONMENT_MACOS: MACOSX_DEPLOYMENT_TARGET=${{ matrix.macosx_deployment_target }}
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macosx_deployment_target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux-x86_64
            cibw_archs: x86_64
            macosx_deployment_target: ""
          - os: windows-latest
            artifact: windows-amd64
            cibw_archs: AMD64
            macosx_deployment_target: ""
          - os: macos-15-intel
            artifact: macos-x86_64
            cibw_archs: x86_64
            macosx_deployment_target: "10.12"
          - os: macos-latest
            artifact: macos-arm64
            cibw_archs: arm64
            macosx_deployment_target: "11.0"
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Install cibuildwheel
        run: python -m pip install --upgrade "cibuildwheel>=2.23,<3"

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Store wheel distributions
        uses: actions/upload-artifact@v5
        with:
          name: python-package-wheels-${{ matrix.artifact }}
          path: wheelhouse/*.whl
          if-no-files-found: error
          retention-days: 7

  check-distributions:
    name: Check distributions
    needs:
      - build-sdist
      - build-wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Download distributions
        uses: actions/download-artifact@v6
        with:
          pattern: python-package-*
          path: dist
          merge-multiple: true

      - name: Check distribution metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

  publish-to-pypi:
    name: Publish to PyPI
    needs:
      - check-distributions
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/sopran
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v6
        with:
          pattern: python-package-*
          path: dist
          merge-multiple: true

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
