name: publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Check tag matches package version
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re
          import sys

          init_py = pathlib.Path("src/sopran/__init__.py").read_text(encoding="utf-8")
          match = re.search(r'^__version__ = "([^"]+)"$', init_py, re.MULTILINE)
          if match is None:
              raise SystemExit("Could not find __version__ in src/sopran/__init__.py")
          version = match.group(1)
          tag_version = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          if version != tag_version:
              print(f"Package version {version!r} does not match tag {tag_version!r}")
              sys.exit(1)
          PY

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Store distribution packages
        uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish-to-pypi:
    name: Publish to PyPI
    needs:
      - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/sopran
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distribution packages
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
