site_name: SOPRAN
site_description: Satellite Observation Package for Retrieval, Analysis, and Navigation
repo_url: https://github.com/Nkzono99/sopran
repo_name: Nkzono99/sopran
site_url: https://nkzono99.github.io/sopran/
strict: true

theme:
  name: material
  language: ja
  features:
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - toc.follow
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: google
            show_source: false

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - First Analysis: getting-started/first-analysis.md
      - Data Store Setup: getting-started/data-store.md
  - Concepts:
      - concepts/object-api.md
      - concepts/store.md
      - concepts/pipeline.md
      - concepts/project-case.md
      - concepts/products-schemas.md
      - concepts/time-units-frames.md
      - concepts/plotting.md
      - concepts/surface.md
  - Missions:
      - Overview: missions/index.md
      - missions/kaguya.md
      - missions/kaguya-esa1.md
      - missions/artemis.md
  - How-to:
      - how-to/load-kaguya-esa1.md
      - how-to/write-normalized-parquet.md
      - how-to/plotstack.md
      - how-to/pipeline-plan.md
      - how-to/moon-surface.md
  - Surface:
      - surface/moon.md
  - Reference:
      - reference/api.md
      - reference/store-layout.md
      - reference/pipeline-rules.md
      - reference/configuration.md
      - reference/roadmap.md
      - reference/design-notes.md
      - reference/license.md
