site_name: SOPRAN
site_description: 衛星観測データの取得、解析、可視化、保存を一貫して扱う Python ライブラリ
repo_url: https://github.com/Nkzono99/sopran
repo_name: Nkzono99/sopran
site_url: https://nkzono99.github.io/sopran/
strict: true
not_in_nav: |
  en/index.md

theme:
  name: material
  language: ja
  custom_dir: docs/overrides
  features:
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - toc.follow
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: google
            show_source: false

extra:
  alternate:
    - name: 日本語
      link: .
      lang: ja
    - name: English
      link: en/
      lang: en
  sopran_language_switcher:
    label: "Lang: 日本語/English"
    fallback_language: ja

extra_css:
  - assets/stylesheets/sopran.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences
  - toc:
      permalink: true

nav:
  - ホーム: index.md
  - 導入:
      - インストール: getting-started/installation.md
      - 最初の解析: getting-started/first-analysis.md
      - データストア: getting-started/data-store.md
  - コンセプト:
      - オブジェクト API: concepts/object-api.md
      - Store: concepts/store.md
      - Pipeline: concepts/pipeline.md
      - Project と Case: concepts/project-case.md
      - Product と Schema: concepts/products-schemas.md
      - 時刻・単位・座標系: concepts/time-units-frames.md
      - 可視化: concepts/plotting.md
      - Maps: concepts/maps.md
  - ミッション:
      - 概要: missions/index.md
      - KAGUYA/SELENE:
          - 概要: missions/kaguya/index.md
          - PACE ESA1: missions/kaguya/esa1.md
      - ARTEMIS:
          - 概要: missions/artemis/index.md
  - How-to:
      - KAGUYA ESA1 を読む: how-to/load-kaguya-esa1.md
      - Parquet に保存する: how-to/write-normalized-parquet.md
      - PlotStack を作る: how-to/plotstack.md
      - Pipeline を計画する: how-to/pipeline-plan.md
      - 月面マップを使う: how-to/moon-maps.md
  - Maps:
      - 月面マップ: maps/moon.md
  - Reference:
      - API リファレンス: reference/api.md
      - スキーマ: reference/schemas.md
      - Store layout: reference/store-layout.md
      - Pipeline rules: reference/pipeline-rules.md
      - 設定: reference/configuration.md
      - 実装状況: reference/status.md
      - 設計メモ: reference/design-notes.md
      - License: reference/license.md
