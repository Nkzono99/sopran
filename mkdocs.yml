site_name: SOPRAN
site_description: 衛星観測データの取得、解析、可視化、保存を一貫して扱う Python ライブラリ
repo_url: https://github.com/Nkzono99/sopran
repo_name: Nkzono99/sopran
site_url: https://nkzono99.github.io/sopran/
strict: true
not_in_nav: |
  en/*.md
  en/**/*.md

theme:
  name: material
  language: ja
  custom_dir: docs/overrides
  features:
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - toc.follow
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: google
            show_source: false

extra:
  alternate:
    - name: 日本語
      link: .
      lang: ja
    - name: English
      link: en/
      lang: en
  sopran_language_switcher:
    label: "Lang: 日本語/English"
    fallback_language: ja

extra_css:
  - assets/stylesheets/sopran.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - First Analysis: getting-started/first-analysis.md
      - Data Store: getting-started/data-store.md
  - Concepts:
      - Object API: concepts/object-api.md
      - Store: concepts/store.md
      - Pipeline: concepts/pipeline.md
      - Project And Case: concepts/project-case.md
      - Products And Schemas: concepts/products-schemas.md
      - Time, Units, And Frames: concepts/time-units-frames.md
      - Plotting: concepts/plotting.md
      - Maps: concepts/maps.md
  - Missions:
      - Overview: missions/index.md
      - KAGUYA/SELENE:
          - Overview: missions/kaguya/index.md
          - PACE ESA1: missions/kaguya/esa1.md
      - ARTEMIS:
          - Overview: missions/artemis/index.md
  - How-to:
      - Load KAGUYA ESA1: how-to/load-kaguya-esa1.md
      - Load KAGUYA LRS: how-to/load-kaguya-lrs.md
      - Visualize KAGUYA LMAG Geometry: how-to/visualize-kaguya-lmag.md
      - Write Normalized Parquet: how-to/write-normalized-parquet.md
      - Build A PlotStack: how-to/plotstack.md
      - Plan A Pipeline: how-to/pipeline-plan.md
      - Use Moon Maps: how-to/moon-maps.md
  - Maps:
      - Moon Maps: maps/moon.md
  - Reference:
      - API Reference: reference/api.md
      - Schemas: reference/schemas.md
      - Store Layout: reference/store-layout.md
      - Pipeline Rules: reference/pipeline-rules.md
      - Configuration: reference/configuration.md
      - Status: reference/status.md
      - Release: reference/release.md
      - Design Notes: reference/design-notes.md
      - License: reference/license.md
